<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Memora Logger</title>
  <style>
    /* ─── Reset & Base ─── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #FAFBFF;
      color: #1e293b;
      overflow-y: auto;
    }

    /* ─── Header ─── */
    .header {
      background: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e2e8f0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #4F46E5, #7e22ce);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: white;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 700;
      color: #4F46E5;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .brand-sub {
      font-size: 10px;
      color: #94a3b8;
    }

    /* Platform indicator dots */
    .platform-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .platform-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      opacity: 0.3;
      transition: opacity 0.3s;
      cursor: default;
    }

    .platform-dot.active {
      opacity: 1;
    }

    .dot-chatgpt  { background: #16a34a; }
    .dot-gemini   { background: #3b82f6; }
    .dot-perplexity { background: #9333ea; }
    .dot-claude   { background: #ea580c; }

    /* ─── Sections ─── */
    .section {
      padding: 14px 16px 6px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    /* ─── Active session card ─── */
    .active-session-card {
      background: linear-gradient(135deg, #4F46E5 0%, #7e22ce 100%);
      border-radius: 12px;
      padding: 14px 16px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .active-session-card::before {
      content: '';
      position: absolute;
      top: -24px;
      right: -24px;
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
    }

    .active-session-card::after {
      content: '';
      position: absolute;
      bottom: -16px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
    }

    .active-session-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 7px;
      position: relative;
    }

    .active-session-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .active-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.3px;
    }

    .active-model {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.65);
    }

    .no-session-card {
      background: #f1f5f9;
      border: 1.5px dashed #cbd5e1;
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
    }

    .no-session-card p {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
    }

    /* ─── Session list ─── */
    .sessions-list {
      padding: 0 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .session-card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 13px;
      display: flex;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .session-card:hover {
      border-color: #a5b4fc;
      background: #f8f7ff;
    }

    .session-card.active {
      border-color: #4F46E5;
      background: #eef2ff;
    }

    .session-icon {
      font-size: 16px;
      width: 32px;
      height: 32px;
      background: #f1f5f9;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .session-card.active .session-icon {
      background: #e0e7ff;
    }

    .session-info {
      flex: 1;
      min-width: 0;
    }

    .session-title {
      font-size: 13px;
      font-weight: 500;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }

    .tag-sm {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      letter-spacing: 0.3px;
    }

    .tag-research  { background: #e0e7ff; color: #4338CA; }
    .tag-coding    { background: #f1f5f9; color: #475569; }
    .tag-writing   { background: #f5f5f4; color: #78716c; }
    .tag-general   { background: #e0f2fe; color: #0369a1; }

    .session-date {
      font-size: 10px;
      color: #94a3b8;
    }

    .session-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4F46E5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .session-card.active .session-check {
      opacity: 1;
    }

    /* New session button */
    .new-session-btn {
      background: transparent;
      border: 1.5px dashed #cbd5e1;
      border-radius: 10px;
      padding: 9px 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      width: 100%;
      color: #94a3b8;
      font-size: 12px;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }

    .new-session-btn:hover {
      border-color: #4F46E5;
      color: #4F46E5;
    }

    .new-session-icon {
      font-size: 14px;
      line-height: 1;
    }

    /* ─── Footer ─── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .capture-count {
      font-size: 11px;
      color: #94a3b8;
    }

    .capture-count strong {
      color: #4F46E5;
      font-weight: 600;
    }

    .open-web-btn {
      font-size: 11px;
      font-weight: 500;
      color: #4F46E5;
      background: #eef2ff;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .open-web-btn:hover {
      background: #e0e7ff;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="logo">M</div>
      <div class="brand-text">
        <span class="brand-name">Memora</span>
        <span class="brand-sub">Chat Logger</span>
      </div>
    </div>
    <div class="platform-dots" id="platformDots">
      <div class="platform-dot dot-chatgpt"    title="ChatGPT"></div>
      <div class="platform-dot dot-gemini"     title="Gemini"></div>
      <div class="platform-dot dot-perplexity" title="Perplexity"></div>
      <div class="platform-dot dot-claude"     title="Claude"></div>
    </div>
  </div>

  <!-- Active session -->
  <div class="section">
    <div class="section-label">Active Session</div>
    <div id="activeSessionArea">
      <div class="no-session-card">
        <p>No session selected.<br>Choose one below to start logging.</p>
      </div>
    </div>
  </div>

  <!-- Sessions list -->
  <div class="section">
    <div class="section-label">Sessions</div>
  </div>
  <div class="sessions-list" id="sessionsList"></div>

  <!-- Footer -->
  <div class="footer">
    <span class="capture-count">Today: <strong id="captureCount">0</strong> captures</span>
    <button class="open-web-btn" id="openWebBtn">Open Memora ↗</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
